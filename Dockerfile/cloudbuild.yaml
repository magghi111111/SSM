steps:
# Step 1: Build the Docker image
# The image will be tagged with the commit SHA for versioning
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'europe-north1-docker.pkg.dev/project-7e62e06f-5df8-477b-abd/my-repo/my-php-python-app:${COMMIT_SHA}', '.']

# Step 2: Push the Docker image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'europe-north1-docker.pkg.dev/project-7e62e06f-5df8-477b-abd/my-repo/my-php-python-app:${COMMIT_SHA}']

# Step 3: Deploy the image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'my-php-python-service' # Your Cloud Run service name
  - '--image'
  - 'europe-north1-docker.pkg.dev/project-7e62e06f-5df8-477b-abd/my-repo/my-php-python-app:${COMMIT_SHA}'
  - '--region'
  - 'europe-north1' # e.g., us-central1
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated' # Adjust as needed for production
  - '--port'
  - '8080' # Ensure this matches the EXPOSE port in your Dockerfile

images:
- 'europe-north1-docker.pkg.dev/project-7e62e06f-5df8-477b-abd/my-repo/my-php-python-app:${COMMIT_SHA}'
options:
  logging: CLOUD_LOGGING_ONLY